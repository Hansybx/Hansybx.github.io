# 指定语言环境
language: node_js
# 指定node_js版本
node_js: 12.18.1
# 指定缓存模块，可选。缓存可加快编译速度。
cache:
  directories:
    - node_modules

# 指定博客源码分支，因人而异。hexo博客源码托管在独立repo则不用设置此项
branches:
  only:
    - blog_hexo

#before_install:
#  - npm install -g hexo-cli

# Start: Build Lifecycle
#install:
#  - npm install
#  - npm install hexo-deployer-git --save

# 执行清缓存，生成网页操作
script:
  - hexo clean
  - hexo generate
  
deploy:
  provider: pages
  skip-cleanup: true
  github-token: $GH_Token
  keep-history: true
  on:
    branch: blog_hexo
  local-dir: public
# End: Build LifeCycle